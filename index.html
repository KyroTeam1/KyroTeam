<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KYRO TEAM | Киберспортивная Организация</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <div class="logo">
                <h1>KYRO <span>TEAM</span></h1>
            </div>
            <ul class="nav-menu">
                <li><a href="#home" class="nav-link">Главная</a></li>
                <li><a href="#team" class="nav-link">Состав</a></li>
                <li><a href="#news" class="nav-link">Новости</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="hero-content">
                <div class="hero-logo">
                    <img src="img/logo.png" alt="KYRO TEAM" class="hero-logo-image">
                    <p class="hero-subtitle">The best tier-6 team</p>
                </div>
            </div>
            <div class="hero-bg"></div>
        </section>

        <section id="team" class="team-section">
            <div class="container">
                <h2 class="section-title">Состав Команды</h2>
                <div class="team-grid" id="teamGrid">
                    <!-- Игроки будут добавлены через JavaScript -->
                </div>
            </div>
        </section>

        <section id="news" class="news-section">
            <div class="container">
                <h2 class="section-title">Новости и Моменты</h2>
                <div class="news-grid" id="newsGrid">
                    <!-- Новости будут добавлены через JavaScript -->
                </div>
            </div>
        </section>

            </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 KYRO TEAM. Все права защищены.</p>
        </div>
    </footer>

    <!-- Модальное окно для статистики игрока -->
    <div id="playerModal" class="modal">
        <div class="modal-content">
            <div id="playerStats"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
